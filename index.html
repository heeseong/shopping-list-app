<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f80ff; }

    .input-row button {
      padding: 10px 18px;
      background: #4f80ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #3a6bea; }
    .input-row button:disabled { background: #a0aec0; cursor: not-allowed; }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    li:hover { background: #f7fafc; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f80ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: color 0.2s;
      word-break: break-word;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover { border-color: #e53e3e; color: #e53e3e; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #a0aec0;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #a0aec0;
      flex-shrink: 0;
    }

    .status-dot.connected { background: #48bb78; }
    .status-dot.error { background: #fc8181; }
    .status-dot.loading { background: #f6ad55; animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input id="item-input" type="text" placeholder="아이템 입력..." />
      <button id="add-btn" onclick="addItem()">추가</button>
    </div>

    <div class="status-bar">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">Supabase 연결 중...</span>
    </div>

    <div class="stats" id="stats"></div>
    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none">아이템을 추가해 보세요!</div>

    <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://qkazijqizwhgwwpijbga.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrYXppanFpendoZ3d3cGlqYmdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDMwOTEsImV4cCI6MjA5MDQxOTA5MX0.rLj1tLJLfD1oDOFOJSdrZQZjT_G9V3p8i36D24m-i8k';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const addBtn     = document.getElementById('add-btn');

    function setStatus(state, msg) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = msg;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render(items) {
      const list  = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      list.innerHTML = '';
      const total = items.length;
      const done  = items.filter(i => i.checked).length;

      empty.style.display = total === 0 ? 'block' : 'none';
      stats.textContent   = total === 0 ? '' : `총 ${total}개 · 완료 ${done}개`;

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');
        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''}
            onchange="window.toggleItem('${item.id}', this.checked)">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="window.deleteItem('${item.id}')" title="삭제">✕</button>
        `;
        list.appendChild(li);
      });
    }

    async function loadItems() {
      setStatus('loading', '불러오는 중...');
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        setStatus('error', '연결 실패: ' + error.message);
        return;
      }
      setStatus('connected', 'Supabase 연결됨');
      render(data);
    }

    window.addItem = async function () {
      const input = document.getElementById('item-input');
      const text  = input.value.trim();
      if (!text) return;

      addBtn.disabled = true;
      const { error } = await supabase
        .from('shopping_items')
        .insert({ text, checked: false });

      addBtn.disabled = false;
      if (error) { setStatus('error', '추가 실패: ' + error.message); return; }
      input.value = '';
      input.focus();
      await loadItems();
    };

    window.toggleItem = async function (id, checked) {
      const { error } = await supabase
        .from('shopping_items')
        .update({ checked })
        .eq('id', id);

      if (error) { setStatus('error', '업데이트 실패: ' + error.message); return; }
      await loadItems();
    };

    window.deleteItem = async function (id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { setStatus('error', '삭제 실패: ' + error.message); return; }
      await loadItems();
    };

    window.clearChecked = async function () {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('checked', true);

      if (error) { setStatus('error', '삭제 실패: ' + error.message); return; }
      await loadItems();
    };

    document.getElementById('item-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.addItem();
    });

    supabase
      .channel('shopping_items_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'shopping_items' }, () => {
        loadItems();
      })
      .subscribe();

    loadItems();
  </script>
</body>
</html>
